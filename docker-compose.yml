version: '3.8'

services:
  # ==================== INFRA ====================

  # API Gateway
  kong-database:
    image: postgres:15-alpine
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 3s
      retries: 5

  kong-migration:
    image: kong:3.6
    container_name: kong-migration
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    command: kong migrations bootstrap
    networks:
      - ticket-network

  kong:
    image: kong:3.6
    container_name: kong
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - ticket-network
    restart: unless-stopped

  kong-setup:
    image: curlimages/curl:latest
    container_name: kong-setup
    depends_on:
      kong:
        condition: service_started
    volumes:
      - ./infra/kong/kong-setup.sh:/kong-setup.sh:ro
    command: ["sh", "/kong-setup.sh"]
    networks:
      - ticket-network
    restart: "no"

  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - event-service
      - order-service
    networks:
      - ticket-network
    restart: unless-stopped

  # Banco de Dados da Aplicação
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ticketuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticketpass}
      POSTGRES_DB: ${DB_NAME:-ticketdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketuser -d ticketdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Fila Assíncrona
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== OBSERVABILIDADE ====================

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ticket-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - ticket-network
    restart: unless-stopped

  # ==================== SERVIÇOS ====================

  auth-service:
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    environment:
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://${DB_USER:-ticketuser}:${DB_PASSWORD:-ticketpass}@postgres:5432/${DB_NAME:-ticketdb}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

  event-service:
    build:
      context: ./services
      dockerfile: event-service/Dockerfile
    deploy:
      replicas: 2
    environment:
      SERVICE_NAME: event-service
      DATABASE_URL: postgresql://${DB_USER:-ticketuser}:${DB_PASSWORD:-ticketpass}@postgres:5432/${DB_NAME:-ticketdb}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

  order-service:
    build:
      context: ./services
      dockerfile: order-service/Dockerfile
    deploy:
      replicas: 2
    environment:
      SERVICE_NAME: order-service
      DATABASE_URL: postgresql://${DB_USER:-ticketuser}:${DB_PASSWORD:-ticketpass}@postgres:5432/${DB_NAME:-ticketdb}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      PAYMENT_SERVICE_URL: http://payment-service:3000
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

  payment-service:
    build:
      context: ./services
      dockerfile: payment-service/Dockerfile
    environment:
      SERVICE_NAME: payment-service
      PORT: 3000
    networks:
      - ticket-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    environment:
      SERVICE_NAME: notification-service
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      PORT: 3000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

# ==================== REDE E VOLUMES ====================

networks:
  ticket-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  kong-db-data: