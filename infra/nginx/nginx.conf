events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:3000;
    }

    upstream event_service {
        server ticket-system-distributed-event-service-1:3000;
        server ticket-system-distributed-event-service-2:3000;
    }

    upstream order_service {
        server ticket-system-distributed-order-service-1:3000;
        server ticket-system-distributed-order-service-2:3000;
    }

    upstream payment_service {
        server payment-service:3000;
    }

    upstream notification_service {
        server notification-service:3000;
    }

    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://auth_service/;
        }

        location /api/events/ {
            proxy_pass http://event_service/;
        }

        location /api/orders/ {
            proxy_pass http://order_service/;
        }

        location /api/payments/ {
            proxy_pass http://payment_service/;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}